- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    # ~/.tmux.conf: tmux.conf
    # ~/.vim: vim
    ~/.vimrc: ./vim/vimrc
    ~/.gitconfig: ./git/gitconfig
    ~/.bashrc:  
        if: '[ -n $(ps -o comm= $$ | grep bash) ]'
        path: ./bash/bashrc
    # Might need to configure the - clean a bit differently if I wan to have both .bashrc and .zshrc simoultainously. 
    # ~/.zshrc:
    #     if: '[ -n $(ps -o comm= $$ | grep zsh) ]'
    #     path: ./zsh/zshrc

- create:
    - ~/.vim/undo-history

- shell:
  - [git submodule update --init --recursive, Installing submodules]
